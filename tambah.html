<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>tambah barang</title>
  
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <h1>form tambah barang</h1>
    
    <form id="formTambah">
      <label>barang</label>
      <input type="text" id="barang" />
      
      <label>harga</label>
      <textarea name="text" id="harga" rows="4"></textarea>
      
      <label>stok</label>
      <input type="text" id="stok">
      
      <button id="tombolSimpan" type="submit">Simpan</button>
    </form>
    
    <a href="daftar.barang">daftar barang</a>
  </div>
  
  <script type="module">
    import { tambahBarang } from './main.js'
    
    // mengirimkan data barang dari form
    const formTambah = document.getElementById('formTambah')
    
    // event ketika form disubmit (dikirim)
    formTambah.addEventListener('submit', function(e) {
      // mencegah reload halaman
      e.preventDefault()
      
      // eksekusi fungsi tambah data barang
      tambahBarang()
    })
  </script>
</body>

</html>
